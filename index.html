<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나 기욥찌?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    body {
      background: #ffdbe8;
      position: relative;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .center-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .title {
      font-size: 52px;
      font-weight: 800;
      color: #c2185b;
      margin-bottom: 36px;
      user-select: none;
      white-space: nowrap;
    }

    .button-wrap {
      position: relative;
      width: 260px;
      height: 100px;
      margin: 0 auto;
    }

    .btn {
      width: 200px;
      height: 90px;
      border: none;
      border-radius: 20px;
      font-size: 32px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    #yesBtn {
      background: #ff4f93;
      color: white;
      position: relative;
      z-index: 3;
      pointer-events: auto;
    }

    #noBtn {
      position: fixed;
      left: 65%;
      top: 58%;
      background: white;
      color: #ff4f93;
      border: 3px solid #ff4f93;
      z-index: 10;
    }

    #finalScreen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: #ffdbe8;
    }

    #finalText {
      font-size: 72px;
      font-weight: 900;
      color: #c2185b;
      text-align: center;
      user-select: none;
      text-shadow: 0 4px 10px rgba(255,255,255,0.5);
    }

    #fireworks {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 25;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .title {
        font-size: 36px;
      }

      .button-wrap {
        width: 180px;
        height: 80px;
      }

      .btn {
        width: 140px;
        height: 72px;
        font-size: 24px;
      }

      #finalText {
        font-size: 44px;
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="center-box" id="mainBox">
      <div class="title">나 기욥찌?</div>
      <div class="button-wrap">
        <button class="btn" id="yesBtn">YES</button>
      </div>
    </div>

    <button class="btn" id="noBtn">NO</button>

    <div id="finalScreen">
      <div id="finalText">나도 알아!</div>
    </div>

    <canvas id="fireworks"></canvas>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const mainBox = document.getElementById("mainBox");
    const finalScreen = document.getElementById("finalScreen");
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    let particles = [];
    let animationId = null;
    let fireworkTimer = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function getDistance(x1, y1, x2, y2) {
      const dx = x1 - x2;
      const dy = y1 - y2;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function moveNoButtonFar(cursorX = null, cursorY = null) {
      const btnWidth = noBtn.offsetWidth;
      const btnHeight = noBtn.offsetHeight;

      const padding = 20;
      const maxX = window.innerWidth - btnWidth - padding;
      const maxY = window.innerHeight - btnHeight - padding;

      const yesRect = yesBtn.getBoundingClientRect();
      const titleRect = mainBox.getBoundingClientRect();

      let newX = 0;
      let newY = 0;
      let tries = 0;

      do {
        newX = Math.random() * (maxX - padding) + padding;
        newY = Math.random() * (maxY - padding) + padding;
        tries++;

        const newCenterX = newX + btnWidth / 2;
        const newCenterY = newY + btnHeight / 2;

        const yesCenterX = yesRect.left + yesRect.width / 2;
        const yesCenterY = yesRect.top + yesRect.height / 2;

        const titleCenterX = titleRect.left + titleRect.width / 2;
        const titleCenterY = titleRect.top + titleRect.height / 2;

        const farFromYes = getDistance(newCenterX, newCenterY, yesCenterX, yesCenterY) > 240;
        const farFromTitle = getDistance(newCenterX, newCenterY, titleCenterX, titleCenterY) > 220;
        const farFromCursor = cursorX === null || cursorY === null
          ? true
          : getDistance(newCenterX, newCenterY, cursorX, cursorY) > 260;

        if (farFromYes && farFromTitle && farFromCursor) {
          break;
        }
      } while (tries < 80);

      noBtn.style.left = `${newX}px`;
      noBtn.style.top = `${newY}px`;
    }

    function escapeFromCursor(e) {
      const rect = noBtn.getBoundingClientRect();
      const btnCenterX = rect.left + rect.width / 2;
      const btnCenterY = rect.top + rect.height / 2;

      const distance = getDistance(e.clientX, e.clientY, btnCenterX, btnCenterY);

      if (distance < 180) {
        moveNoButtonFar(e.clientX, e.clientY);

        if (distance < 110) {
          setTimeout(() => moveNoButtonFar(e.clientX, e.clientY), 40);
        }
      }
    }

    document.addEventListener("mousemove", escapeFromCursor);
    noBtn.addEventListener("mouseenter", moveNoButtonFar);
    noBtn.addEventListener("mousedown", function (e) {
      e.preventDefault();
      moveNoButtonFar(e.clientX, e.clientY);
    });
    noBtn.addEventListener("touchstart", function (e) {
      e.preventDefault();
      moveNoButtonFar();
    }, { passive: false });

    function createFirework(x, y) {
      const count = 80;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = Math.random() * 4 + 2;
        const hue = Math.floor(Math.random() * 360);

        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          size: Math.random() * 3 + 2,
          gravity: 0.03 + Math.random() * 0.03,
          color: `hsl(${hue}, 100%, 60%)`
        });
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.alpha -= 0.015;

        if (p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      animationId = requestAnimationFrame(animateFireworks);
    }

    function startCelebration() {
      noBtn.style.display = "none";
      mainBox.style.display = "none";
      finalScreen.style.display = "flex";
      canvas.style.display = "block";

      createFirework(window.innerWidth * 0.25, window.innerHeight * 0.35);
      createFirework(window.innerWidth * 0.5, window.innerHeight * 0.25);
      createFirework(window.innerWidth * 0.75, window.innerHeight * 0.35);

      animateFireworks();

      fireworkTimer = setInterval(() => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * (window.innerHeight * 0.55) + 40;
        createFirework(x, y);
      }, 500);
    }

    yesBtn.addEventListener("click", startCelebration);

    moveNoButtonFar();
  </script>
</body>
</html>
