<html id="x4g7k2" <!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>챱츄의 편지</title> <style> * { box-sizing: border-box; } html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; font-family: "Malgun Gothic", Arial, sans-serif; overflow-x: hidden; } body { background: linear-gradient(180deg, #ffe6ef 0%, #ffd7e6 100%); position: relative; color: #5b2c3d; } .heart-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; } .heart { position: absolute; bottom: -40px; font-size: 20px; opacity: 0.75; animation-name: floatUp; animation-timing-function: linear; animation-fill-mode: forwards; user-select: none; } @keyframes floatUp { 0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; } 10% { opacity: 0.8; } 100% { transform: translateY(-120vh) translateX(30px) scale(1.2); opacity: 0; } } .page { position: relative; z-index: 1; min-height: 100vh; padding: 40px 16px 80px; display: flex; justify-content: center; } .content { width: 100%; max-width: 520px; text-align: center; } .top-photo { width: 100%; max-width: 320px; display: block; margin: 0 auto 28px; border-radius: 28px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.16); border: 6px solid rgba(255, 255, 255, 0.7); } .envelope-scene { margin-top: 8px; } .question { font-size: 30px; font-weight: 800; margin: 18px 0 18px; color: #b03060; text-shadow: 0 2px 6px rgba(255, 255, 255, 0.5); } .button-wrap { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; } button { border: none; border-radius: 999px; padding: 14px 28px; font-size: 18px; font-weight: 800; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14); } button:hover { transform: translateY(-2px); } .yes-btn { background: #ff6fa3; color: #fff; } .no-btn { background: #fff; color: #ff4f8d; border: 2px solid #ff8db6; } .envelope-wrap { position: relative; width: 320px; height: 230px; margin: 0 auto; perspective: 1200px; } .envelope { position: absolute; inset: 0; margin: auto; width: 320px; height: 210px; } .envelope-back { position: absolute; inset: 0; background: #ffd7a8; border-radius: 12px; box-shadow: 0 18px 35px rgba(0, 0, 0, 0.15); overflow: hidden; } .envelope-back::before, .envelope-back::after { content: ""; position: absolute; bottom: 0; width: 50%; height: 100%; background: #ffcd8d; z-index: 3; } .envelope-back::before { left: 0; clip-path: polygon(0 100%, 100% 100%, 100% 0); } .envelope-back::after { right: 0; clip-path: polygon(0 0, 0 100%, 100% 100%); } .flap { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: #ffc783; clip-path: polygon(0 0, 50% 85%, 100% 0); transform-origin: top center; transition: transform 1s ease; z-index: 5; filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.08)); } .letter { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(110px); width: 280px; background: #fffdf7; border-radius: 14px; box-shadow: 0 14px 32px rgba(0, 0, 0, 0.18); padding: 24px 18px 20px; z-index: 2; opacity: 0; transition: transform 1.15s cubic-bezier(0.2, 0.9, 0.2, 1), opacity 0.6s ease; border: 1px solid #f0e7d8; background-image: linear-gradient(to bottom, rgba(255,255,255,0.98), rgba(255,250,240,0.98)), repeating-linear-gradient( to bottom, transparent 0, transparent 31px, rgba(255, 192, 203, 0.18) 32px ); } .letter-text { white-space: pre-line; font-size: 24px; line-height: 1.7; font-weight: 700; color: #7a3d52; margin-bottom: 18px; } .letter-photo { width: 100%; border-radius: 16px; display: block; border: 4px solid #fff; box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12); } .opened .flap { transform: rotateX(180deg); } .show-letter .letter { opacity: 1; transform: translateX(-50%) translateY(-85px); z-index: 6; } .hint { margin-top: 18px; font-size: 14px; color: rgba(91, 44, 61, 0.7); } @media (max-width: 480px) { .question { font-size: 24px; } .envelope-wrap, .envelope { width: 290px; } .envelope { height: 200px; } .letter { width: 252px; padding: 20px 14px 16px; } .letter-text { font-size: 21px; } } </style> </head> <body> <div class="heart-bg" id="heartBg"></div> <div class="page"> <div class="content"> <img src="챱츄2.jpg" alt="챱츄2" class="top-photo" /> <div class="envelope-scene"> <div class="envelope-wrap" id="envelopeWrap"> <div class="envelope"> <div class="envelope-back"></div> <div class="flap"></div> <div class="letter" id="letterPaper"> <div class="letter-text">누나,,,,!!! 찹츄가 미아내 잘못해써 챱츄 용서해조,,,, 보구시프니까 얼른와조오,,,</div> <img src="챱츄1.jpg" alt="챱츄1" class="letter-photo" /> </div> </div> </div> <div class="question">편지를 여시겠습니까?</div> <div class="button-wrap" id="buttonWrap"> <button type="button" class="yes-btn" id="yesBtn">네</button> <button type="button" class="no-btn" id="noBtn">아니오</button> </div> <div class="hint" id="hintText">챱츄가 기다리고 있어오...</div> </div> </div> </div> <script> const heartBg = document.getElementById("heartBg"); const yesBtn = document.getElementById("yesBtn"); const noBtn = document.getElementById("noBtn"); const envelopeWrap = document.getElementById("envelopeWrap"); const hintText = document.getElementById("hintText"); function createHeart() { const heart = document.createElement("div"); heart.className = "heart"; heart.textContent = Math.random() > 0.5 ? "❤" : "💗"; heart.style.left = Math.random() * 100 + "vw"; heart.style.animationDuration = (5 + Math.random() * 4) + "s"; heart.style.fontSize = (16 + Math.random() * 18) + "px"; heart.style.opacity = (0.45 + Math.random() * 0.4).toFixed(2); heartBg.appendChild(heart); setTimeout(() => { heart.remove(); }, 9500); } for (let i = 0; i < 14; i++) { setTimeout(createHeart, i * 280); } setInterval(createHeart, 420); noBtn.addEventListener("click", function () { alert("읽어조!!!"); }); yesBtn.addEventListener("click", function () { yesBtn.disabled = true; noBtn.disabled = true; hintText.textContent = "챱츄가 떨리는 마음으로 편지를 열고 있어오..."; envelopeWrap.classList.add("opened"); setTimeout(() => { envelopeWrap.classList.add("show-letter"); hintText.textContent = "편지가 나와써오..."; }, 900); }); </script> </body> </html>
