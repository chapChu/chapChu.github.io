<html lang="ko">
<head>

    :root {
      --bg: #fff7f1;
      --card: #ffffff;
      --text: #242424;
      --muted: #6b6b6b;
      --primary: #ff7a90;
      --primary-dark: #e85872;
      --sub: #ffe2e8;
      --line: #f0d5dc;
      --blue: #5a8dee;
      --green: #2fa36b;
      --yellow: #f3b73f;
      --shadow: 0 14px 35px rgba(80, 45, 55, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",

      background:

        radial-gradient(circle at 90% 10%, #fff0c8 0, transparent 25%),
        radial-gradient(circle at 50% 90%, #e8f2ff 0, transparent 30%),

      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .hero {
      background: linear-gradient(135deg, #ff8fa3, #ffd36e);
      border-radius: 32px;
      padding: 28px;
      color: white;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "✈️ 🗼 🍜 🛍️";
      position: absolute;
      right: 20px;
      bottom: 12px;
      font-size: 46px;
      opacity: 0.28;
      letter-spacing: 8px;
      white-space: nowrap;
    }

    .hero-label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: rgba(255, 255, 255, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    .hero h1 {
      margin: 18px 0 8px;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -1.4px;
    }

    .hero p {
      margin: 0;
      font-size: 17px;
      opacity: 0.95;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 20px;
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .hero-stat strong {
      display: block;
      font-size: 20px;
      margin-bottom: 2px;
    }

    .hero-stat span {
      font-size: 13px;
      opacity: 0.9;
    }

    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 0 10px;
      background: linear-gradient(to bottom, rgba(255, 247, 241, 0.96), rgba(255, 247, 241, 0.82));
      backdrop-filter: blur(12px);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      border: 0;
      background: white;
      color: var(--muted);
      padding: 11px 16px;
      border-radius: 999px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(80, 45, 55, 0.08);
      transition: 0.18s ease;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      transform: translateY(-1px);
    }

    .panel {
      display: none;
      animation: fadeIn 0.18s ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      margin: 20px 0 12px;
      font-size: 24px;
      letter-spacing: -0.7px;
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(240, 213, 220, 0.9);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .mini-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
    }

    .mini-card .emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    .mini-card h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .mini-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .todo-list {
      display: grid;
      gap: 10px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: start;
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
    }

    .todo-item input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: #999;
    }

    .todo-title {
      font-weight: 800;
    }

    .todo-desc {
      color: var(--muted);
      font-size: 14px;
      margin-top: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;

      color: #c73553;
    }

    .badge.check {
      background: #e6f5ee;
      color: #1b7a4d;
    }

    .badge.memo {
      background: #eef4ff;
      color: #3267c8;
    }

    .day-head {

      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 12px;
    }

    .day-head h2 {

      font-size: 27px;
      letter-spacing: -0.8px;
    }

    .day-head p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 14px;
    }

    .schedule-card {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 15px;
      box-shadow: 0 8px 22px rgba(80, 45, 55, 0.08);

    .time {

      font-weight: 900;
      color: var(--primary-dark);
      padding-top: 4px;
    }

    .schedule-main h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .schedule-main p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .pill {
      background: #faf3f5;
      border: 1px solid #f0d6dd;
      color: #6a4750;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 11px;
      border-radius: 12px;
      background: var(--text);
      color: white;
      font-size: 13px;
      font-weight: 900;
    }

    .action-btn.sub {
      background: #fff2f5;
      color: #c73553;
      border: 1px solid #ffd0da;
    }

    .map-box {
      margin-top: 12px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #f7f7f7;
    }

    iframe {
      width: 100%;
      height: 230px;
      border: 0;
      display: block;
    }

    .notice {
      background: #fff9e7;
      border: 1px solid #f7df9e;
      border-radius: 18px;
      padding: 14px;
      color: #6f5615;
      font-size: 14px;
    }

    .etc-list {
      display: grid;
      gap: 12px;
    }

    .etc-row {
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .etc-row strong {
      display: block;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .app {
        padding: 14px 12px 46px;
      }

      .hero {
        padding: 22px;
        border-radius: 26px;
      }

      .hero-grid,
      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .schedule-card {
        grid-template-columns: 1fr;
      }

      .time {
        background: #fff1f4;
        display: inline-flex;
        width: fit-content;
        padding: 5px 10px;
        border-radius: 999px;
      }

      iframe {
        height: 190px;
      }
    }
  </style>
</head>

      day4: {
        title: "4일차 · 06/21 일요일",
        subtitle: "체크아웃 · 마지막 쇼핑 · 나리타 이동 · 귀국",
        schedules: [
          {
            time: "오전",
            title: "체크아웃 · 짐 보관",
            desc: "숙소에 짐 보관 가능 여부를 확인하고, 불가하면 역 코인락커를 고려하십시오.",
            place: "이비스 스타일스 도쿄 긴자",
            tags: ["체크아웃", "짐"],
            mapQuery: "ibis Styles Tokyo Ginza"
          },
          {
            time: "오전~점심",
            title: "긴자 주변 마지막 일정",
            desc: "귀국일은 멀리 이동하지 않는 것이 안전합니다. 긴자·도쿄역 주변 정도가 적정합니다.",
            place: "긴자 / 도쿄역",
            tags: ["마지막 일정", "안전 동선"],
            mapQuery: "Tokyo Station Ginza"
          },
          {
            time: "14:30 전후",
            title: "공항 이동 준비",
            desc: "18:25 출국이므로 공항버스·전철 모두 여유 있게 잡아야 합니다. 버스는 교통상황 변수가 있습니다.",
            place: "긴자 → 나리타공항",
            tags: ["교통", "중요"],
            mapQuery: "Ginza to Narita Airport"
          },
          {
            time: "16:00 전후",
            title: "나리타공항 도착 목표",
            desc: "수하물, 출국심사, 면세/식사 시간을 감안한 목표 시간입니다.",
            place: "Narita International Airport",
            tags: ["공항", "여유"],
            mapQuery: "Narita International Airport"
          },
          {
            time: "18:25",
            title: "나리타 출국",
            desc: "NRT → ICN, 20:55 인천 도착 예정.",
            place: "Narita International Airport",
            tags: ["항공", "확정"],
            mapQuery: "Narita International Airport"
          }
        ]
      }
    };

    const etcItems = [
      {
        title: "교통 원칙",
        desc: "첫날·마지막날은 짐이 있으므로 편의성 우선. 디즈니 이동은 Suica 기반 전철 이동을 기본으로 판단."
      },
      {
        title: "현금/카드",
        desc: "카드는 기본으로 사용하되, 소액 현금은 준비. 교통카드 충전도 여유 있게."
      },
      {
        title: "일정 운영 기준",
        desc: "하루에 욕심을 과하게 넣지 말고, 핵심 2~3개를 성공시키는 방식이 안전합니다."
      },
      {
        title: "주의사항",
        desc: "버스는 교통상황 영향을 받습니다. 귀국일 공항 이동은 반드시 보수적으로 잡으십시오."
      }
    ];

    /************************************************************
     * 아래부터는 화면 렌더링 로직입니다.
     ************************************************************/
    const $ = (selector) => document.querySelector(selector);

    function getBadgeClass(type) {
      if (type === "must") return "must";
      if (type === "check") return "check";
      return "memo";
    }

    function getBadgeText(type) {
      if (type === "must") return "필수";
      if (type === "check") return "확인";
      return "메모";
    }

    function calcDday() {
      const today = new Date();
      const start = new Date(trip.startDate + "T00:00:00");
      const diff = Math.ceil((start - today) / (1000 * 60 * 60 * 24));

      if (diff > 0) return `D-${diff}`;
      if (diff === 0) return "D-Day";
      return "여행 완료";
    }

    function initHero() {
      $("#tripTitle").textContent = trip.title;
      $("#tripSubtitle").textContent = trip.subtitle;
      $("#tripHotel").textContent = "긴자";
      $("#tripHighlight").textContent = "디즈니";
      $("#dDay").textContent = calcDday();
    }

    function renderTabs() {
      const tabsEl = $("#tabs");

      tabsEl.innerHTML = tabs.map((tab, index) => `
        <button class="tab-btn ${index === 0 ? "active" : ""}" data-tab="${tab.id}">
          ${tab.label}
        </button>
      `).join("");

      tabsEl.addEventListener("click", (event) => {
        const btn = event.target.closest(".tab-btn");
        if (!btn) return;

        document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((el) => el.classList.remove("active"));

        btn.classList.add("active");
        $("#" + btn.dataset.tab).classList.add("active");
      });
    }

    function renderMainPanel() {
      return `
        <section class="panel active" id="main">
          <h2 class="section-title">전체 개요</h2>

          <div class="grid-2">
            <div class="card">
              <h2 style="margin-top:0;">🗼 ${trip.title}</h2>
              <p>
                ${trip.subtitle}<br />
                인원: <strong>${trip.people}</strong><br />
                숙소: <strong>${trip.hotel}</strong><br />
                핵심 일정: <strong>${trip.highlight}</strong>
              </p>

              <div class="notice">
                현재 코드에는 확정된 항공·숙소·디즈니 일정과, 아직 확정이 필요한 후보 일정을 함께 넣었습니다.
                실제 이동 시간과 식당 예약 여부는 출발 전 최종 확인해야 합니다.
              </div>
            </div>

            <div class="card">
              <h2 style="margin-top:0;">✈️ 항공 정보</h2>
              <div class="mini-card" style="margin-bottom:10px;">
                <span class="emoji">🛫</span>
                <h3>출국</h3>
                <p>${trip.airportOut}</p>
              </div>
              <div class="mini-card">
                <span class="emoji">🛬</span>
                <h3>귀국</h3>
                <p>${trip.airportIn}</p>
              </div>
            </div>
          </div>

          <h2 class="section-title">여행 운영 원칙</h2>
          <div class="grid-3">
            <div class="mini-card">
              <span class="emoji">🎯</span>
              <h3>핵심 일정 우선</h3>
              <p>디즈니, 쇼핑, 야경처럼 꼭 하고 싶은 것을 먼저 고정합니다.</p>
            </div>
            <div class="mini-card">
              <span class="emoji">🧳</span>
              <h3>짐 있는 날은 보수적으로</h3>
              <p>첫날과 마지막날은 이동 편의성과 시간 여유가 더 중요합니다.</p>
            </div>
            <div class="mini-card">
              <span class="emoji">📱</span>
              <h3>오프라인 저장</h3>
              <p>항공권, 숙소, 디즈니 QR, 교통 정보를 캡처로 저장합니다.</p>
            </div>
          </div>
        </section>
      `;
    }

    function renderTodoPanel() {
      return `
        <section class="panel" id="todo">
          <h2 class="section-title">출발 전 To-do</h2>
          <div class="card">
            <div class="todo-list">
              ${todos.map(todo => `
                <label class="todo-item" data-todo-id="${todo.id}">
                  <input type="checkbox" />
                  <div>
                    <div class="todo-title">${todo.title}</div>
                    <div class="todo-desc">${todo.desc}</div>
                  </div>
                  <span class="badge ${getBadgeClass(todo.type)}">${getBadgeText(todo.type)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderMap(item) {
      if (!item.mapQuery) return "";

      const query = encodeURIComponent(item.mapQuery);
      const mapUrl = `https://www.google.com/maps?q=${query}`;
      const embedUrl = `https://www.google.com/maps?q=${query}&output=embed`;

      return `
        <div class="actions">
          <a class="action-btn" href="${mapUrl}" target="_blank" rel="noopener">지도 열기</a>
          <a class="action-btn sub" href="https://www.google.com/search?q=${query}" target="_blank" rel="noopener">검색</a>
        </div>
        <div class="map-box">
          <iframe
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            src="${embedUrl}">
          </iframe>
        </div>
      `;
    }

    function renderDayPanel(dayId, day) {
      return `
        <section class="panel" id="${dayId}">
          <div class="day-head">
            <div>
              <h2>${day.title}</h2>
              <p>${day.subtitle}</p>
            </div>
          </div>

          <div class="timeline">
            ${day.schedules.map(item => `
              <article class="schedule-card">
                <div class="time">${item.time}</div>
                <div class="schedule-main">
                  <h3>${item.title}</h3>
                  <p>${item.desc}</p>

                  <div class="meta">
                    <span class="pill">📍 ${item.place}</span>
                    ${(item.tags || []).map(tag => `<span class="pill">${tag}</span>`).join("")}
                  </div>

                  ${renderMap(item)}
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderEtcPanel() {
      return `
        <section class="panel" id="etc">
          <h2 class="section-title">etc · 메모</h2>
          <div class="card">
            <div class="etc-list">
              ${etcItems.map(item => `
                <div class="etc-row">
                  <strong>${item.title}</strong>
                  <span>${item.desc}</span>
                </div>
              `).join("")}
            </div>
          </div>

          <h2 class="section-title">수정 위치</h2>
          <div class="card">
            <p style="margin-top:0;">
              일정 수정은 코드 상단의 <strong>trip</strong>, <strong>todos</strong>, <strong>days</strong>, <strong>etcItems</strong>만 고치면 됩니다.
            </p>
            <div class="notice">
              지도는 Google Maps API 키 없이 검색어 기반 iframe으로 붙였습니다.
              정확한 매장 지도를 넣고 싶으면 mapQuery 값을 매장명 또는 주소로 바꾸면 됩니다.
            </div>
          </div>
        </section>
      `;
    }

    function renderPanels() {
      const panelsEl = $("#panels");

      panelsEl.innerHTML = [
        renderMainPanel(),
        renderTodoPanel(),
        renderDayPanel("day1", days.day1),
        renderDayPanel("day2", days.day2),
        renderDayPanel("day3", days.day3),
        renderDayPanel("day4", days.day4),
        renderEtcPanel()
      ].join("");
    }

    function initTodos() {
      const storageKey = "tokyo-trip-todos";

      const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");

      document.querySelectorAll(".todo-item").forEach(item => {
        const id = item.dataset.todoId;
        const checkbox = item.querySelector("input");

        checkbox.checked = !!saved[id];
        item.classList.toggle("done", checkbox.checked);

        checkbox.addEventListener("change", () => {
          saved[id] = checkbox.checked;
          localStorage.setItem(storageKey, JSON.stringify(saved));
          item.classList.toggle("done", checkbox.checked);
        });
      });
    }

    function boot() {
      initHero();
      renderTabs();
      renderPanels();
      initTodos();
    }

    boot();
  </script>
</body>
</html>
